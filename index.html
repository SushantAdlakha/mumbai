<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- ============================================================= -->
<!--  💖  EASIEST EDITS ARE IN THE  <script>  "CONFIG" BLOCK BELOW  -->
<!--      (your names, the date, and your photo file names)         -->
<!-- ============================================================= -->

<title>Will You Be My Valentine? 💕</title>

<style>
  /* ---------- COLOR THEME ---------- */
  :root {
    --pink:      #ff8fb1;
    --pink-soft: #ffd1e3;
    --cream:     #fff5f7;
    --purple:    #d6a8ff;
    --text:      #6b4456;
    --glow:      #ff9ecd;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
    color: var(--text);
    text-align: center;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fff5f7 0%, #ffe3ef 40%, #f3e0ff 100%);
    background-size: 200% 200%;
    animation: bgShift 14s ease infinite;
  }
  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ---------- HERO CARD ---------- */
  .card {
    position: relative;
    z-index: 5;
    max-width: 640px;
    width: 90%;
    padding: 44px 30px 52px;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 40px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(255, 143, 177, 0.35),
                0 0 0 1px rgba(255, 255, 255, 0.6) inset;
    animation: floatCard 6s ease-in-out infinite;
  }
  @keyframes floatCard {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }

  .hero-emoji {
    font-size: 84px;
    line-height: 1;
    display: inline-block;
    animation: beat 1.4s ease-in-out infinite;
    filter: drop-shadow(0 0 18px var(--glow));
  }
  @keyframes beat {
    0%, 100% { transform: scale(1); }
    25%      { transform: scale(1.15); }
    40%      { transform: scale(0.98); }
  }

  h1 {
    font-size: clamp(28px, 6vw, 46px);
    margin: 16px 0 10px;
    background: linear-gradient(90deg, var(--pink), var(--purple));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 20px rgba(255, 158, 205, 0.4);
  }
  .subtitle {
    font-size: clamp(15px, 3vw, 19px);
    opacity: 0.85;
    margin-bottom: 28px;
    line-height: 1.6;
  }

  /* ---------- POLAROID PHOTO STRIP ---------- */
  .photos {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 30px;
  }
  .polaroid {
    background: #fff;
    padding: 8px 8px 26px;
    border-radius: 6px;
    box-shadow: 0 10px 22px rgba(255, 143, 177, 0.35);
    transition: transform 0.3s ease;
  }
  .polaroid:nth-child(1) { transform: rotate(-6deg); }
  .polaroid:nth-child(2) { transform: rotate(3deg) translateY(-6px); }
  .polaroid:nth-child(3) { transform: rotate(7deg); }
  .polaroid:hover { transform: rotate(0deg) scale(1.06); z-index: 6; }
  .polaroid img {
    display: block;
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 3px;
  }
  /* shown if a photo file is missing, so the page never looks broken */
  .polaroid .fallback {
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    background: linear-gradient(135deg, #ffd1e3, #e7c9ff);
    border-radius: 3px;
  }
  .polaroid .cap {
    display: block;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text);
    font-style: italic;
  }

  /* ---------- BUTTONS ---------- */
  .buttons {
    display: flex;
    gap: 22px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    font-size: 22px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    padding: 16px 44px;
    border-radius: 50px;
    transition: transform 0.18s ease, box-shadow 0.3s ease;
  }
  .btn-yes {
    color: #fff;
    background: linear-gradient(135deg, #ff7eb3, #ff5e9c);
    box-shadow: 0 8px 25px rgba(255, 94, 156, 0.5);
    animation: glowPulse 2s ease-in-out infinite;
  }
  .btn-yes:hover { transform: scale(1.12); }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 8px 25px rgba(255, 94, 156, 0.5); }
    50%      { box-shadow: 0 8px 40px rgba(255, 94, 156, 0.9); }
  }
  .btn-no {
    color: var(--text);
    background: #fff;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    /* the gentle nudge is done with transform in JS */
    transition: transform 0.2s ease;
  }

  /* ---------- FULL-SCREEN SURPRISE SEQUENCE ---------- */
  .show-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px;
    background: linear-gradient(135deg, #ffd1e3 0%, #ffe9c7 50%, #e7c9ff 100%);
  }
  .show-screen.show { display: flex; animation: fadeIn 0.8s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* each step inside the surprise */
  .step { display: none; max-width: 760px; width: 100%; }
  .step.active { display: block; animation: fadeIn 0.6s ease; }

  .step h2 {
    font-size: clamp(34px, 9vw, 86px);
    background: linear-gradient(90deg, #ff5e9c, #b06bff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: beat 1.2s ease-in-out infinite;
    line-height: 1.05;
  }
  .step p { font-size: clamp(17px, 3.5vw, 26px); margin-top: 16px; line-height: 1.5; }
  .big-heart {
    font-size: clamp(60px, 16vw, 140px);
    animation: beat 1.2s ease-in-out infinite;
    filter: drop-shadow(0 0 30px var(--glow));
  }

  /* live countdown */
  .countdown { display: flex; gap: 14px; justify-content: center; margin-top: 26px; flex-wrap: wrap; }
  .count-box {
    background: rgba(255,255,255,0.7);
    border-radius: 20px;
    padding: 14px 20px;
    min-width: 84px;
    box-shadow: 0 10px 24px rgba(255,143,177,0.3);
  }
  .count-box .num { font-size: clamp(28px, 7vw, 48px); font-weight: 800; color: #ff5e9c; }
  .count-box .lbl { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; }

  /* date plan list, items pop in one by one */
  .plan { list-style: none; margin: 24px auto 0; max-width: 480px; text-align: left; }
  .plan li {
    background: rgba(255,255,255,0.75);
    margin: 12px 0;
    padding: 16px 20px;
    border-radius: 18px;
    font-size: clamp(16px, 3vw, 22px);
    box-shadow: 0 8px 20px rgba(255,143,177,0.25);
    opacity: 0;
    transform: translateY(16px);
  }
  .plan li.in { animation: popIn 0.5s ease forwards; }
  @keyframes popIn { to { opacity: 1; transform: translateY(0); } }

  /* memory strip on the win screen */
  .win-photos { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
  .win-photos .polaroid img, .win-photos .polaroid .fallback { width: 140px; height: 140px; }

  .next-btn {
    margin-top: 34px;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #ff7eb3, #b06bff);
    border: none;
    border-radius: 50px;
    padding: 15px 40px;
    cursor: pointer;
    box-shadow: 0 10px 28px rgba(176,107,255,0.45);
    transition: transform 0.18s ease;
  }
  .next-btn:hover { transform: scale(1.08); }

  /* ---------- FLOATING HEARTS + CONFETTI ---------- */
  .floaty { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  .show-screen .floaty { z-index: 101; }
  .heart {
    position: absolute;
    bottom: -60px;
    animation: rise linear forwards;
  }
  @keyframes rise { to { transform: translateY(-120vh) rotate(360deg); opacity: 0; } }
  .confetti {
    position: absolute;
    top: -20px;
    width: 10px; height: 16px;
    border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0.9; } }
</style>
</head>

<body>

  <!-- background hearts for the whole page -->
  <div class="floaty" id="bgHearts"></div>

  <!-- =================== HERO CARD =================== -->
  <div class="card" id="card">
    <div class="hero-emoji">🧸💖</div>

    <h1 id="title">Will You Meet Me on 19th June? 💕</h1>
    <p class="subtitle" id="subtitle">Loading…</p>

    <!-- Your photos from your last meet appear here automatically -->
    <div class="photos" id="heroPhotos"></div>

    <div class="buttons" id="buttons">
      <button class="btn btn-yes" id="yesBtn">YES 🥰</button>
      <button class="btn btn-no"  id="noBtn">No 🙈</button>
    </div>
  </div>

  <!-- =================== SURPRISE SEQUENCE (after YES) =================== -->
  <div class="show-screen" id="show">
    <div class="floaty" id="winHearts"></div>

    <!-- STEP 1: celebration -->
    <div class="step active" id="step1">
      <div class="big-heart">💖</div>
      <h2>YAYYY! 🎉</h2>
      <p id="winLine">You said YES!</p>
      <button class="next-btn" data-next="2">There's more… 💌</button>
    </div>

    <!-- STEP 2: live countdown -->
    <div class="step" id="step2">
      <h2>The countdown is ON! ⏳</h2>
      <p id="cdLine">Until our date…</p>
      <div class="countdown" id="countdown"></div>
      <button class="next-btn" data-next="3">Aww, what's the plan? 🌷</button>
    </div>

    <!-- STEP 3: the date plan -->
    <div class="step" id="step3">
      <h2>Our little date plan 💕</h2>
      <ul class="plan" id="plan"></ul>
      <button class="next-btn" data-next="4">I love it! 📸</button>
    </div>

    <!-- STEP 4: memories -->
    <div class="step" id="step4">
      <h2>My favourite moments 📸</h2>
      <p id="memLine">…and so many more to come.</p>
      <div class="win-photos" id="winPhotos"></div>
      <button class="next-btn" data-next="5">One last thing… 💞</button>
    </div>

    <!-- STEP 5: final message -->
    <div class="step" id="step5">
      <div class="big-heart">💞</div>
      <h2 id="finalTitle">I can't wait!</h2>
      <p id="finalMsg"></p>
    </div>
  </div>

<script>
  /* ===================================================================
     ★★★  CONFIG  —  THIS IS THE ONLY PART YOU NEED TO EDIT  ★★★
     =================================================================== */
  const CONFIG = {
    yourName: "Sushant",         // 👈 your name
    herName:  "Prashansa",       // 👈 her name

    dateText: "19th June",        // 👈 how the date reads on screen
    dateISO:  "2026-06-19T19:00", // 👈 date+time for the countdown (YYYY-MM-DDThh:mm)

    // 👇 Your photos from your last meet.
    //    Upload photos to the repo named EXACTLY like this (or change the names here).
    //    If a photo is missing, a cute heart placeholder shows instead — never broken.
    photos: [
      { file: "photo1.jpg", caption: "us 💗" },
      { file: "photo2.jpg", caption: "last meet 🌸" },
      { file: "photo3.jpg", caption: "my favourite 😍" }
    ],

    // 👇 The fun "date plan" list (add/remove lines freely)
    datePlan: [
      "I pick you up looking my best (I'll try 😅)",
      "Good food + your favourite dessert 🍰",
      "A long walk and even longer talks 🌙",
      "A little surprise I'm not telling you yet 🎁"
    ]
  };

  /* ===================================================================
     Everything below makes the magic work — no need to touch it.
     =================================================================== */

  // ---- fill in the words from CONFIG ----
  document.getElementById('title').innerHTML =
    `Will You Meet Me on ${CONFIG.dateText}? 💕`;
  document.getElementById('subtitle').innerHTML =
    `Hey ${CONFIG.herName} 🌷 — ever since I met you, every day feels softer and brighter. ` +
    `So ${CONFIG.yourName} has just one little question for you…`;
  document.getElementById('winLine').innerHTML =
    `${CONFIG.herName}, you just made ${CONFIG.yourName} the happiest person alive! 💞`;
  document.getElementById('cdLine').innerHTML =
    `Counting every second until <strong>${CONFIG.dateText}</strong> with you…`;
  document.getElementById('memLine').innerHTML =
    `A few favourites with you, ${CONFIG.herName} — and so many more to come.`;
  document.getElementById('finalTitle').innerHTML = `I can't wait, ${CONFIG.herName}! 💞`;
  document.getElementById('finalMsg').innerHTML =
    `See you on <strong>${CONFIG.dateText}</strong>. Thank you for being my favourite person. ` +
    `<br/><em>— ${CONFIG.yourName}</em>`;

  // ---- build a polaroid photo (with safe fallback) ----
  function makePolaroid(p) {
    const wrap = document.createElement('div');
    wrap.className = 'polaroid';
    const img = document.createElement('img');
    img.src = p.file;
    img.alt = p.caption;
    img.onerror = function () {
      const fb = document.createElement('div');
      fb.className = 'fallback';
      fb.textContent = '💖';
      wrap.replaceChild(fb, img);
    };
    const cap = document.createElement('span');
    cap.className = 'cap';
    cap.textContent = p.caption;
    wrap.appendChild(img);
    wrap.appendChild(cap);
    return wrap;
  }
  const heroPhotos = document.getElementById('heroPhotos');
  const winPhotos  = document.getElementById('winPhotos');
  CONFIG.photos.forEach(p => {
    heroPhotos.appendChild(makePolaroid(p));
    winPhotos.appendChild(makePolaroid(p));
  });

  // ---- the GENTLE "No" button (nudges nearby, doesn't fly away) ----
  const noBtn = document.getElementById('noBtn');
  function nudge() {
    const dx = (Math.random() * 120 - 60);  // -60 .. +60 px sideways
    const dy = (Math.random() * 60 - 30);   // -30 .. +30 px up/down
    noBtn.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx/8}deg)`;
  }
  noBtn.addEventListener('mouseover', nudge);
  noBtn.addEventListener('click', function (e) { e.preventDefault(); nudge(); });
  noBtn.addEventListener('touchstart', function (e) { e.preventDefault(); nudge(); }, { passive: false });

  // ---- floating hearts ----
  function spawnHeart(container, emojis) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (18 + Math.random() * 30) + 'px';
    const dur = 5 + Math.random() * 6;
    h.style.animationDuration = dur + 's';
    h.style.opacity = 0.5 + Math.random() * 0.5;
    container.appendChild(h);
    setTimeout(() => h.remove(), dur * 1000);
  }
  setInterval(() => spawnHeart(document.getElementById('bgHearts'), ['💗','💕','🌸','💞']), 700);

  // ---- confetti ----
  function spawnConfetti(container) {
    const colors = ['#ff7eb3','#ff5e9c','#b06bff','#ffd86b','#7ad7ff','#ff9ecd'];
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    const dur = 2.5 + Math.random() * 2.5;
    c.style.animationDuration = dur + 's';
    container.appendChild(c);
    setTimeout(() => c.remove(), dur * 1000);
  }

  // ---- live countdown to the date ----
  function startCountdown() {
    const box = document.getElementById('countdown');
    const target = new Date(CONFIG.dateISO).getTime();
    function tick() {
      const now = Date.now();
      let diff = Math.max(0, target - now);
      const d = Math.floor(diff / 86400000); diff -= d * 86400000;
      const h = Math.floor(diff / 3600000);  diff -= h * 3600000;
      const m = Math.floor(diff / 60000);    diff -= m * 60000;
      const s = Math.floor(diff / 1000);
      const cell = (n, l) => `<div class="count-box"><div class="num">${n}</div><div class="lbl">${l}</div></div>`;
      box.innerHTML = cell(d,'days') + cell(h,'hrs') + cell(m,'min') + cell(s,'sec');
    }
    tick();
    setInterval(tick, 1000);
  }

  // ---- reveal the date-plan items one by one ----
  function buildPlan() {
    const ul = document.getElementById('plan');
    CONFIG.datePlan.forEach((item, i) => {
      const li = document.createElement('li');
      li.textContent = '💗  ' + item;
      ul.appendChild(li);
      setTimeout(() => li.classList.add('in'), 300 + i * 500);
    });
  }
  let planBuilt = false;

  // ---- step navigation ----
  function goToStep(n) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
    if (n === 2) startCountdown();
    if (n === 3 && !planBuilt) { buildPlan(); planBuilt = true; }
  }
  document.querySelectorAll('.next-btn').forEach(b => {
    b.addEventListener('click', () => goToStep(b.dataset.next));
  });

  // ---- YES! start the whole celebration ----
  document.getElementById('yesBtn').addEventListener('click', function () {
    document.getElementById('card').style.display = 'none';
    document.getElementById('show').classList.add('show');
    const wh = document.getElementById('winHearts');
    for (let i = 0; i < 90; i++) setTimeout(() => spawnConfetti(wh), i * 55);
    setInterval(() => spawnConfetti(wh), 130);
    setInterval(() => spawnHeart(wh, ['💖','💘','💝','💗','😍']), 240);
  });
</script>
</body>
</html>
